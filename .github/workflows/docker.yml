name: Build and Push Docker image to GHCR

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/trackerv01:latest
          docker build -t $IMAGE .

      - name: Push image
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/trackerv01:latest
          docker push $IMAGE
